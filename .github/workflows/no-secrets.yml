# What this does
#   Runs gitleaks against every PR and every push to main. Fails CI if any
#   real secret-like pattern (API keys, OAuth tokens, Stripe keys, JWTs, etc.)
#   slips into a commit. Project-level allowlist lives in `.gitleaks.toml`
#   at the repo root — extend the standard ruleset rather than replacing it.
#
# Local repro (recommended before pushing)
#   brew install gitleaks                         # macOS
#   # or: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.18.4 detect --source=/repo --config=/repo/.gitleaks.toml
#   gitleaks detect --config .gitleaks.toml       # whole-history scan of working tree
#   gitleaks protect --staged --config .gitleaks.toml  # pre-commit-style scan of staged changes only
#
# Pin rationale
#   A pinned gitleaks image keeps CI reproducible. Bump intentionally after
#   running a local baseline scan and refreshing allowlists for true false
#   positives only.
name: Security (gitleaks)
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Pinned for reproducibility.
      image: zricethezav/gitleaks:v8.18.4
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit on the branch,
          # not just the surface tree. PRs scan the diff against base by default.
          fetch-depth: 0
      - name: Run gitleaks
        # `detect` scans the full git history; non-zero exit = leak found.
        # `--redact` keeps any matched secret out of the CI log itself.
        # `--exit-code 1` is the gitleaks default but pinned explicitly here.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --exit-code 1 --verbose
