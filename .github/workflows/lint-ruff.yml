name: Lint (ruff)
on:
  pull_request:
    paths:
      - "agent/**.py"
      - "agent/pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check agent/ --select E,F,W --ignore E501,E402 --exit-non-zero-on-fix --no-fix
