# Operator follow-up
# =============================================================================
#
# After this PR merges:
#   1. Validate with a sample board run (same prompts as the $2 incident).
#      Confirm actual cost lands near $0.04/run.
#   2. Re-run each department's flagship workflow once. Confirm output
#      quality is acceptable on the new model.
#   3. If any role's quality regresses, file a follow-up to bump that
#      specific agent up a tier rather than reverting wholesale.
#   4. Consider wiring `board-drunken-master` into board.yaml as a
#      separate follow-up; model recommendation included above.
