# Zone 3 Core Engineering Team — AgentToolConfig registrations
#
# These agents are registered in the bridge's AgentToolRegistry
# and can be invoked as agent-tools by the Chief Engineer.

agents:
  - name: engineering-backend-architect
    description: System architecture, multi-language backend design
    system_prompt: "See agent/config/claude-files/agents/engineering-backend-architect.md"
    trust_domain: engineering
    trust_min_score: 0.0
    timeout_seconds: 600
    max_tokens: 100000
    allowed_mcp_servers:
      - github
      - bumba-memory
      - mongodb
    input_schema:
      type: object
      properties:
        task:
          type: string
          description: "The engineering task to perform"
        context:
          type: string
          description: "Project context and relevant file paths"
      required:
        - task

  - name: engineering-frontend-developer
