<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
{{BRAND_CSS}}

/* Document-specific styles */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-body-family, system-ui, -apple-system, sans-serif);
  font-size: var(--font-body-size, 16px);
  font-weight: var(--font-body-weight, 400);
  line-height: 1.7;
  color: #1a1a1a;
  background: #ffffff;
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 40px;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.document-header {
  border-bottom: 4px solid var(--color-primary, #1a1a1a);
  padding-bottom: 30px;
  margin-bottom: 40px;
}

.document-header h1 {
  font-family: var(--font-heading-family, Georgia, serif);
  font-size: calc(var(--font-heading-size, 48px) * 0.6);
  font-weight: var(--font-heading-weight, 400);
  color: var(--color-primary, #1a1a1a);
  margin-bottom: 0.3em;
  line-height: 1.2;
}

.document-meta {
  font-size: 0.9em;
  color: #666;
}

.document-meta span {
  margin-right: 20px;
}

/* Typography */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading-family, Georgia, serif);
  font-weight: var(--font-heading-weight, 400);
  color: var(--color-primary, #1a1a1a);
  line-height: 1.3;
}

h2 {
  font-size: calc(var(--font-heading-size, 48px) * 0.45);
  margin-top: 2em;
  margin-bottom: 0.5em;
  padding-bottom: 0.3em;
  border-bottom: 2px solid #e0e0e0;
}

h3 {
  font-size: calc(var(--font-heading-size, 48px) * 0.35);
  margin-top: 1.5em;
  margin-bottom: 0.5em;
}

h4 {
  font-size: calc(var(--font-heading-size, 48px) * 0.28);
  margin-top: 1.5em;
  margin-bottom: 0.5em;
}

p {
  margin-bottom: 1em;
}

/* Lists */
ul, ol {
  margin-left: 1.5em;
  margin-bottom: 1em;
}

li {
  margin-bottom: 0.5em;
}

/* Links */
a {
  color: var(--color-primary, #0066cc);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* Blockquotes */
blockquote {
  margin: 1.5em 0;
  padding: 1em 1.5em;
  border-left: 4px solid var(--color-primary);
  background: #f8f8f8;
  font-style: italic;
}

blockquote cite {
  display: block;
  font-style: normal;
  margin-top: 0.5em;
  color: #666;
  font-size: 0.9em;
}

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5em 0;
}

th, td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid #e0e0e0;
}

th {
  font-weight: 600;
  background: #f8f8f8;
  border-bottom: 2px solid var(--color-primary);
}

/* Code */
code {
  font-family: var(--font-caption-family, 'SF Mono', Consolas, monospace);
  font-size: 0.9em;
  background: #f4f4f4;
  padding: 0.2em 0.4em;
  border-radius: 3px;
}

pre {
  background: #1a1a1a;
  color: #f8f8f8;
  padding: 1em;
  border-radius: var(--radius-sm, 8px);
  overflow-x: auto;
  margin: 1.5em 0;
}

pre code {
  background: none;
  padding: 0;
}

/* Callouts */
.callout {
  padding: 1em 1.5em;
  border-radius: var(--radius-sm, 8px);
  margin: 1.5em 0;
  border-left: 4px solid;
}

.callout.info {
  background: #e8f4fd;
  border-color: #0066cc;
}

.callout.success {
  background: #e8f8e8;
  border-color: var(--color-success, #00aa00);
}

.callout.warning {
  background: #fff8e8;
  border-color: var(--color-warning, #ffaa00);
}

.callout.error {
  background: #fde8e8;
  border-color: var(--color-error, #dd0000);
}

.callout-title {
  font-weight: 600;
  margin-bottom: 0.5em;
}

/* Cards */
.card {
  background: #f8f8f8;
  padding: 24px;
  border-radius: var(--radius-sm, 8px);
  margin: 1.5em 0;
  border-left: 4px solid var(--color-primary);
}

/* Images */
figure {
  margin: 1.5em 0;
}

figure img {
  max-width: 100%;
  border-radius: var(--radius-sm, 8px);
}

figcaption {
  font-size: 0.9em;
  color: #666;
  margin-top: 0.5em;
  text-align: center;
}

/* Horizontal rule */
hr {
  border: none;
  border-top: 1px solid #e0e0e0;
  margin: 2em 0;
}

/* Table of contents */
.toc {
  background: #f8f8f8;
  padding: 24px;
  border-radius: var(--radius-sm, 8px);
  margin-bottom: 2em;
}

.toc h2 {
  font-size: 1.2em;
  margin-top: 0;
  margin-bottom: 0.5em;
  border-bottom: none;
}

.toc ul {
  list-style: none;
  margin-left: 0;
}

.toc li {
  margin-bottom: 0.3em;
}

.toc a {
  color: #1a1a1a;
}

/* Footer */
.document-footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid #e0e0e0;
  font-size: 0.9em;
  color: #666;
  text-align: center;
}

/* Utility classes */
.text-primary { color: var(--color-primary); }
.text-secondary { color: var(--color-secondary); }
.accent { color: var(--color-secondary); }
.highlight {
  background: var(--color-primary);
  color: white;
  padding: 0.1em 0.4em;
  border-radius: 4px;
}

/* Print styles */
@media print {
  body {
    max-width: none;
    padding: 0;
    font-size: 11pt;
  }

  .document-header {
    margin-bottom: 30px;
  }

  h2 { margin-top: 1.5em; }

  a { color: inherit; }

  /* Page breaks */
  h2, h3 {
    page-break-after: avoid;
  }

  .avoid-break {
    page-break-inside: avoid;
  }

  .page-break {
    page-break-after: always;
  }

  /* Ensure backgrounds print */
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}

@page {
  size: letter;
  margin: 1in;
}
  </style>
</head>
<body>
  <header class="document-header">
    <h1>{{TITLE}}</h1>
    <div class="document-meta">
      <span>{{DATE}}</span>
    </div>
  </header>

  <main>
{{CONTENT}}
  </main>

  <footer class="document-footer">
    <p>Generated with Design Bridge</p>
  </footer>
</body>
</html>
