name: job_search.submit_via_lever
trigger: explicit
budget:
  max_cost_usd: 2.50
  max_duration_seconds: 1800
# 1112 Sprint 5j.07 — Zone 4 job-search Layer 2 workflow for Lever ATS
# submission. Mirrors Greenhouse (#2157) with Lever-specific form-fill
# logic via agent/job_search/ats/lever.py.
#
# Architecture (per merged ADRs #2156, #2158, #2159 + impl #2160):
# Claude computer-use over CloakBrowser stealth Chromium, scoped to
# job-search ONLY; bumba-browser UID sandbox; .secrets-backed credential
# vault with ats_<family>_<account>_<field> namespacing.
#
# DEPENDS ON #2157 — that PR adds "job_search" to the DepartmentStep
# literal in agent/config/workflows/_schema.py. This YAML will fail to
# load until that schema extension lands on main.
#
# Flat layout per workflow_registry.py:63 glob.
steps:
  - name: authenticate-credentials
    department: job_search
    intent: >
      Resolve credential REFERENCE (ats_lever_<account>) and authenticate
      to Lever. Lever uses jobs.lever.co/<company> URLs; auth via the
      candidate-portal flow if the account is known. On failure HALT
      with Discord blocker.
    outputs: ["auth_session"]

  - name: navigate-to-listing
    department: job_search
    inputs: ["auth_session"]
    intent: >
      Navigate to the listing URL via CloakBrowser. Verify listing still
      open. Capture initial page state.
    outputs: ["listing_state"]

  - name: prepare-application-bundle
    department: job_search
    inputs: ["listing_state"]
    intent: >
      Load prepared bundle from Notion staging row. Validate required
      Lever fields covered. Missing fields → HALT.
    outputs: ["application_bundle"]

  - name: fill-form
    department: job_search
    inputs: ["listing_state", "application_bundle"]
    intent: >
      Fill the Lever form per agent/job_search/ats/lever.py field mapping.
      Lever typically uses a single Full Name field (not split). Resume
      upload + cover-letter textarea. humanize=True for keyboard timing.
    outputs: ["form_filled_state"]

  - name: capture-pre-submit-screenshot
    department: job_search
    inputs: ["form_filled_state"]
    intent: >
      Capture filled-form screenshot to data/job_search/applications/<id>/pre-submit.png.
    outputs: ["pre_submit_screenshot_path"]

  - name: submit-application
    department: job_search
    inputs: ["form_filled_state"]
    intent: >
      Click submit. Capture post-submit state. On captcha: escalate via
      Playwright fallback (#2165), then HALT if still failing.
    outputs: ["post_submit_state"]

  - name: capture-post-submit-screenshot
    department: job_search
    inputs: ["post_submit_state"]
    intent: >
      Capture confirmation page screenshot to post-submit.png.
    outputs: ["post_submit_screenshot_path"]

  - name: poll-receipt-email
    department: job_search
    inputs: ["post_submit_state"]
    intent: >
      Poll Gmail for Lever application-received confirmation (10min
      timeout). Lever's emails come from noreply@hire.lever.co.
    outputs: ["receipt_evidence"]

  - name: update-notion
    department: job_search
    inputs: ["pre_submit_screenshot_path", "post_submit_screenshot_path", "receipt_evidence"]
    intent: >
      Update Notion row to "submitted" with ATS family=lever + timestamp +
      verification artifact set.
    outputs: ["notion_row_id"]

  - name: synthesize-summary
    department: job_search
    inputs: ["receipt_evidence", "notion_row_id"]
    intent: >
      Discord summary: company/role, timestamp, 3/3 artifacts, Notion link.
    outputs: ["discord_summary"]
