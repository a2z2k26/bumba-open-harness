# Feature Flag Registry (Sprint P6.3, issue #1595)
#
# Single source of truth for every boolean feature flag declared on
# bridge.config.BridgeConfig. Used by agent/scripts/check_feature_flags.py
# to detect drift between:
#   1. BridgeConfig dataclass fields (bool, default = True/False)
#   2. _TOML_MAP keys in bridge/config.py
#   3. bridge.toml documentation / runtime defaults
#   4. This registry
#
# Schema (per entry):
#   field:           dataclass attribute name on BridgeConfig (required, key)
#   toml_key:        "section.key" path in bridge.toml ("" if env-only)
#   owner:           sprint id, plan, or subsystem responsible for the flag
#   default:         dataclass default (true/false) — MUST match BridgeConfig
#   runtime_reader:  module:symbol or file path that reads the flag at runtime
#   docs:            short prose pointer to where the flag is described
#   status:          active | dormant | scaffold | deprecated
#
# Status legend:
#   active     — flag is wired AND flipped on (or operator-tunable) in prod
#   dormant    — flag is wired but defaults to False; awaiting flip
#   scaffold   — flag exists but the subsystem it gates is not yet shipped
#   deprecated — flag still in code, slated for removal
#
# When you add a new bool feature flag to BridgeConfig, also add it here.
# The CI gate (`check_feature_flags.py`) fails the PR otherwise.

